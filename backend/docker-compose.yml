  #     - ./scripts:/scripts
  #     - ./files:/files

  report-task:
    build:
      context: .
      dockerfile: ./tasks/reportTask/Dockerfile
    image: report-task
    ports:
      - "5001:80"  # Map host's port 5001 to container's port 80
    env_file:
      - ./.env
    volumes:
      - ./:/app
    
    command: [
        "sh", 
        "-c", 
        "echo 'Contents of .:' && ls -R . && echo 'Starting uvicorn' && uvicorn tasks.reportTask.main:app --host 0.0.0.0 --port 80"
    ]

  celery-worker:
    build:
      context: .
      dockerfile: ./tasks/reportTask/Dockerfile  # Use the same Dockerfile as report-task
    image: celery-worker
    env_file:
      - ./.env
    volumes:
      - ./:/app

    command: ["sh", "-c", "ls -R . && celery -A managers.celeryManager worker --loglevel=info --concurrency=1"]
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
