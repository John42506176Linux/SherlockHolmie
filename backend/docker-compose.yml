  report-task:
    build:
      context: .
      dockerfile: ./tasks/reportTask/Dockerfile
    image: report-task
    ports:
      - "80:80"  # Map host's port 5001 to container's port 80
    env_file:
      - ./.env
    volumes:
      - ./:/app
    command: ["/bin/sh", "/app/startup.sh"]
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
